project:
  type: website
  output-dir: _site
  render:
    - "notes/**/*.qmd"
    - "!contribute/**"

website:
  title: "卒論準備のためのデータ分析ノート"
  navbar:
    left:
      - href: notes/index.qmd
        text: 講義ノート
  sidebar:
    style: docked
    search: true
    contents:
      - href: notes/index.qmd
        text: 一覧
      - section: 各回
        contents:
          - href: notes/sessions/session-01.qmd
            text: 第1回
          - href: notes/sessions/session-02.qmd
            text: 第2回

format:
  html:
    toc: true
    number-sections: true
    theme: flatly
    css: styles.css
    lang: ja

execute:
  echo: false
  warning: false
  message: false
